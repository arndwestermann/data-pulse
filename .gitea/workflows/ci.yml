name: CI
run-name: '${{ gitea.actor }} → ${{ gitea.ref_name }}'

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  PNPM_VERSION: '10'

jobs:
  test:
    name: Test
    runs-on: node-24
    defaults:
      run:
        shell: sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive NX SHAs
        run: |
          HEAD="${{ gitea.sha }}"

          if [ "${{ gitea.event_name }}" = "pull_request" ]; then
            # PR: diff against the base branch SHA provided in event payload
            BASE="${{ gitea.event.pull_request.base.sha }}"
          else
            # Push: diff against previous commit; fall back to first commit if only one exists
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          fi

          echo "NX_BASE=$BASE" >> $GITHUB_ENV
          echo "NX_HEAD=$HEAD" >> $GITHUB_ENV
          echo "NX_BASE=$BASE  NX_HEAD=$HEAD"

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ gitea.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Test affected
        run: pnpm nx affected --target=test --base=$NX_BASE --head=$NX_HEAD --parallel=3 --ci --passWithNoTests

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ gitea.sha }}
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: node-24
    needs: test
    defaults:
      run:
        shell: sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive NX SHAs
        run: |
          HEAD="${{ gitea.sha }}"

          if [ "${{ gitea.event_name }}" = "pull_request" ]; then
            BASE="${{ gitea.event.pull_request.base.sha }}"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          fi

          echo "NX_BASE=$BASE" >> $GITHUB_ENV
          echo "NX_HEAD=$HEAD" >> $GITHUB_ENV
          echo "NX_BASE=$BASE  NX_HEAD=$HEAD"

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ gitea.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Build affected
        run: pnpm nx affected --target=build --base=$NX_BASE --head=$NX_HEAD --parallel=3

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ gitea.sha }}
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy via SSH
    runs-on: node-24
    needs: build
    if: gitea.event_name == 'push' && (gitea.ref == 'refs/heads/main' || gitea.ref == 'refs/heads/master')
    defaults:
      run:
        shell: sh
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ gitea.sha }}
          path: dist/

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            dist/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
            cd $DEPLOY_PATH
            # pm2 restart api
            # nginx -s reload
          EOF

          rm -f ~/.ssh/deploy_key
